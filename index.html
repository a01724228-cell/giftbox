<!DOCTYPE html>
<html>
<head>
    <title>A Special Surprise</title>
    <style>
        body { background-color: #86adb0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #title { color: white; font-family: "Curlz MT", cursive; font-size: 38px; margin-bottom: 20px; height: 45px; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        #openBtn { background-color: #2e3e6e; color: #d1d1d1; font-family: "Curlz MT", cursive; font-size: 48px; padding: 15px 45px; border: none; border-radius: 18px; cursor: pointer; box-shadow: 0 6px 12px rgba(0,0,0,0.3); transition: 0.2s; }
        #openBtn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="title"></div>
    <canvas id="giftCanvas" width="500" height="500"></canvas>
    <button id="openBtn">OPEN :)</button>

    <script>
        const canvas = document.getElementById('giftCanvas');
        const ctx = canvas.getContext('2d');
        let stage = 0; let progress = 0;

        function draw() {
            ctx.clearRect(0, 0, 500, 500);
            ctx.save();
            ctx.translate(250, 250); 

            if (stage < 2) {
                let flyUp = progress * 450;
                let fade = 1 - progress;

                // 1. BOX BODY
                ctx.fillStyle = "#8b2a2a"; // Left
                ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-100, -50); ctx.lineTo(-100, 100); ctx.lineTo(0, 150); ctx.fill();
                ctx.fillStyle = "#6e1f1f"; // Right
                ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(100, -50); ctx.lineTo(100, 100); ctx.lineTo(0, 150); ctx.fill();

                // 2. BODY RIBBONS
                ctx.fillStyle = "#d4af37";
                ctx.beginPath(); ctx.moveTo(-45, -22); ctx.lineTo(-55, -27); ctx.lineTo(-55, 123); ctx.lineTo(-45, 128); ctx.fill();
                ctx.beginPath(); ctx.moveTo(45, -22); ctx.lineTo(55, -27); ctx.lineTo(55, 123); ctx.lineTo(45, 128); ctx.fill();

                // 3. LID ASSEMBLY
                ctx.save();
                ctx.translate(0, -flyUp);
                ctx.globalAlpha = fade;

                // LID LIP (LOWERED MANUALLY TO LOCK)
                ctx.fillStyle = "#7a2424";
                ctx.beginPath(); 
                ctx.moveTo(-105, -45); ctx.lineTo(0, 8); ctx.lineTo(105, -45); 
                ctx.lineTo(105, -25); ctx.lineTo(0, 28); ctx.lineTo(-105, -25); 
                ctx.closePath(); ctx.fill();

                // LID TOP
                ctx.fillStyle = "#a33232";
                ctx.beginPath(); ctx.moveTo(0, 8); ctx.lineTo(105, -45); ctx.lineTo(0, -98); ctx.lineTo(-105, -45); ctx.closePath(); ctx.fill();
                
                // LID CROSS RIBBONS
                ctx.fillStyle = "#e6be45";
                ctx.beginPath(); ctx.moveTo(-52, -18); ctx.lineTo(-42, -13); ctx.lineTo(52, -72); ctx.lineTo(42, -77); ctx.fill();
                ctx.beginPath(); ctx.moveTo(52, -18); ctx.lineTo(42, -13); ctx.lineTo(-52, -72); ctx.lineTo(-42, -77); ctx.fill();

                // 4. THE BOW (Redesigned Loops)
                ctx.translate(0, -45); 

                // Bottom Layer: Diagonal Tails
                ctx.fillStyle = "#c5a02c";
                ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-55, 50); ctx.lineTo(-35, 55); ctx.lineTo(0,5); ctx.fill();
                ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(55, 50); ctx.lineTo(35, 55); ctx.lineTo(0,5); ctx.fill();

                // Middle Layer: Rounded Bow Loops (Thickened Wings)
                ctx.fillStyle = "#d4af37";
                
                // Left Loop (Puffed out significantly wider)
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-85, -80, -95, 20, 0, 0);
                ctx.fill();
                
                // Right Loop (Puffed out significantly wider)
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(85, -80, 95, 20, 0, 0);
                ctx.fill();

                // Top Layer: Knot
                ctx.beginPath(); ctx.arc(0, 0, 14, 0, Math.PI * 2); ctx.fill();

                ctx.restore();
            }

            if (stage === 2) {
                // THE REVEAL
                ctx.fillStyle = "white";
                ctx.beginPath(); ctx.roundRect(-140, -30, 280, 60, [0, 30, 30, 0]); ctx.fill();
                ctx.fillStyle = "#3b73d1";
                ctx.beginPath(); ctx.roundRect(-180, -30, 80, 60, [30, 0, 0, 30]); ctx.fill();
                ctx.fillStyle = "#1a1a1a"; ctx.fillRect(-20, -18, 110, 36);
                ctx.fillStyle = "#5f5"; ctx.font = "bold 18px Courier New"; ctx.textAlign = "center";
                ctx.fillText("PREGNANT", 35, 7);
            }

            if (stage === 1) {
                progress += 0.02;
                if (progress >= 1) stage = 2;
            }
            ctx.restore();
            requestAnimationFrame(draw);
        }

        document.getElementById('openBtn').onclick = () => {
            stage = 1;
            document.getElementById('openBtn').style.display = 'none';
            document.getElementById('title').innerText = "SURPRISE! :)";
        };
        draw();
    </script>
</body>
</html>
