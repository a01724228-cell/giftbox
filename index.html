<!DOCTYPE html>
<html>
<head>
    <title>A Special Gift</title>
    <style>
        body { background-color: #86adb0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #title { color: white; font-family: "Curlz MT", cursive; font-size: 38px; margin-bottom: 20px; height: 45px; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        #openBtn { background-color: #2e3e6e; color: #d1d1d1; font-family: "Curlz MT", cursive; font-size: 48px; padding: 15px 45px; border: none; border-radius: 18px; cursor: pointer; box-shadow: 0 6px 12px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div id="title"></div>
    <canvas id="giftCanvas" width="500" height="400"></canvas>
    <button id="openBtn">OPEN :)</button>

    <script>
        const canvas = document.getElementById('giftCanvas');
        const ctx = canvas.getContext('2d');
        let stage = 0; let progress = 0;

        function draw() {
            ctx.clearRect(0, 0, 500, 400);
            ctx.save();
            ctx.translate(250, 200); // Center of the screen

            if (stage < 2) {
                let flyUp = progress * 300;
                
                // 1. DRAW BOX BODY
                // Left Side
                ctx.fillStyle = "#8b2a2a";
                ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-90, -45); ctx.lineTo(-90, 75); ctx.lineTo(0, 120); ctx.fill();
                // Right Side (Darker for depth)
                ctx.fillStyle = "#631a1a";
                ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(90, -45); ctx.lineTo(90, 75); ctx.lineTo(0, 120); ctx.fill();
                
                // 2. RIBBON ON BODY (Centered)
                ctx.fillStyle = "#d4af37";
                ctx.beginPath(); ctx.moveTo(-12, 6); ctx.lineTo(12, 6); ctx.lineTo(12, 114); ctx.lineTo(-12, 114); ctx.fill();

                // 3. DRAW LID (Moves up when clicked)
                ctx.save();
                ctx.translate(0, -flyUp);
                ctx.globalAlpha = 1 - progress;

                // Lid Sides
                ctx.fillStyle = "#7a2424";
                ctx.beginPath(); ctx.moveTo(-95, -42); ctx.lineTo(0, 5); ctx.lineTo(95, -42); ctx.lineTo(95, -30); ctx.lineTo(0, 17); ctx.lineTo(-95, -30); ctx.fill();
                
                // Lid Top (Diamond Shape)
                ctx.fillStyle = "#a33232";
                ctx.beginPath(); ctx.moveTo(0, -42); ctx.lineTo(95, -90); ctx.lineTo(0, -135); ctx.lineTo(-95, -90); ctx.closePath(); ctx.fill();

                // Gold Ribbon on Top
                ctx.fillStyle = "#e6be45";
                ctx.beginPath(); ctx.moveTo(-12, -48); ctx.lineTo(83, -95); ctx.lineTo(71, -101); ctx.lineTo(-24, -54); ctx.fill();
                
                // Bow Loops
                ctx.fillStyle = "#d4af37";
                ctx.beginPath(); ctx.ellipse(-25, -100, 12, 25, Math.PI/3.5, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(25, -100, 12, 25, -Math.PI/3.5, 0, Math.PI*2); ctx.fill();
                
                ctx.restore();
            }

            if (stage === 2) {
                // Test Stick
                ctx.fillStyle = "white";
                ctx.beginPath(); ctx.roundRect(-140, -30, 280, 60, [0, 30, 30, 0]); ctx.fill();
                ctx.fillStyle = "#3b73d1";
                ctx.beginPath(); ctx.roundRect(-180, -30, 80, 60, [30, 0, 0, 30]); ctx.fill();
                ctx.fillStyle = "#1a1a1a";
                ctx.fillRect(-20, -18, 110, 36);
                ctx.fillStyle = "#5f5"; ctx.font = "bold 18px Courier New"; ctx.textAlign = "center";
                ctx.fillText("PREGNANT", 35, 7);
            }

            if (stage === 1) {
                progress += 0.02;
                if (progress >= 1) stage = 2;
            }
            ctx.restore();
            requestAnimationFrame(draw);
        }

        document.getElementById('openBtn').onclick = () => {
            stage = 1;
            document.getElementById('openBtn').style.display = 'none';
            document.getElementById('title').innerText = "SURPRISE! :)";
        };
        draw();
    </script>
</body>
</html>
