<!DOCTYPE html>
<html>
<head>
    <title>Surprise! :)</title>
    <style>
        body { background-color: #86adb0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #title { color: white; font-family: "Curlz MT", cursive; font-size: 38px; margin-bottom: 20px; text-shadow: 1px 1px 3px rgba(0,0,0,0.2); height: 45px; }
        #openBtn { background-color: #2e3e6e; color: #d1d1d1; font-family: "Curlz MT", cursive; font-size: 48px; padding: 15px 45px; border: none; border-radius: 18px; cursor: pointer; box-shadow: 0 6px 12px rgba(0,0,0,0.3); transition: 0.2s; }
        #openBtn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="title"></div>
    <canvas id="giftCanvas" width="500" height="400"></canvas>
    <button id="openBtn">OPEN :)</button>

    <script>
        const canvas = document.getElementById('giftCanvas');
        const ctx = canvas.getContext('2d');
        let stage = 0; // 0: Idle, 1: Opening, 2: Reveal
        let progress = 0;

        function draw() {
            ctx.clearRect(0, 0, 500, 400);
            ctx.save();
            ctx.translate(250, 220);

            if (stage < 2) {
                let flyUp = progress * 250;
                let fade = 1 - progress;
                
                // --- DRAW BOX BODY (3D Perspective) ---
                // Right Side (Darker)
                ctx.fillStyle = "#631a1a";
                ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(80, -40); ctx.lineTo(80, 80); ctx.lineTo(0, 120); ctx.fill();
                // Left Side (Lighter)
                ctx.fillStyle = "#8b2a2a";
                ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-80, -40); ctx.lineTo(-80, 80); ctx.lineTo(0, 120); ctx.fill();
                // Front Ribbon
                ctx.fillStyle = "#d4af37";
                ctx.fillRect(-10, 5, 20, 110);

                // --- DRAW LID (Flying Away) ---
                ctx.save();
                ctx.translate(0, -flyUp);
                ctx.globalAlpha = fade;
                
                // Lid Top
                ctx.fillStyle = "#a33232";
                ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo(90, -55); ctx.lineTo(0, -100); ctx.lineTo(-90, -55); ctx.fill();
                // Lid Ribbon
                ctx.fillStyle = "#e6be45";
                ctx.beginPath(); ctx.moveTo(-10, -15); ctx.lineTo(80, -60); ctx.lineTo(70, -65); ctx.lineTo(-20, -20); ctx.fill();
                
                // The Bow Loops
                ctx.fillStyle = "#d4af37";
                ctx.beginPath(); ctx.ellipse(-30, -70, 15, 30, Math.PI/4, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(30, -70, 15, 30, -Math.PI/4, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }

            if (stage === 2) {
                drawTestStick();
            }

            if (stage === 1) {
                progress += 0.02;
                if (progress >= 1) { stage = 2; }
            }
            ctx.restore();
            requestAnimationFrame(draw);
        }

        function drawTestStick() {
            // White Body
            ctx.fillStyle = "white";
            ctx.beginPath(); ctx.roundRect(-140, -30, 280, 60, [0, 30, 30, 0]); ctx.fill();
            // Blue Cap
            ctx.fillStyle = "#3b73d1";
            ctx.beginPath(); ctx.roundRect(-180, -30, 80, 60, [30, 0, 0, 30]); ctx.fill();
            // Screen
            ctx.fillStyle = "#1a1a1a";
            ctx.fillRect(-20, -18, 110, 36);
            
            // Result
            ctx.fillStyle = "#5f5";
            ctx.font = "bold 18px Courier New";
            ctx.textAlign = "center";
            ctx.fillText("PREGNANT", 35, 7);
        }

        document.getElementById('openBtn').onclick = () => {
            stage = 1;
            document.getElementById('openBtn').style.display = 'none';
            document.getElementById('title').innerText = "SURPRISE! :)";
        };
        draw();
    </script>
</body>
</html>
