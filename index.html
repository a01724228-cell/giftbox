<!DOCTYPE html>
<html>
<head>
    <title>A Special Surprise</title>
    <style>
        body { background-color: #86adb0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #title { color: white; font-family: "Curlz MT", cursive; font-size: 38px; margin-bottom: 20px; height: 45px; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        #openBtn { background-color: #2e3e6e; color: #d1d1d1; font-family: "Curlz MT", cursive; font-size: 48px; padding: 15px 45px; border: none; border-radius: 18px; cursor: pointer; box-shadow: 0 6px 12px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div id="title"></div>
    <canvas id="giftCanvas" width="500" height="500"></canvas>
    <button id="openBtn">OPEN :)</button>

    <script>
        const canvas = document.getElementById('giftCanvas');
        const ctx = canvas.getContext('2d');
        let stage = 0; let progress = 0;

        function draw() {
            ctx.clearRect(0, 0, 500, 500);
            ctx.save();
            ctx.translate(250, 250); 

            if (stage < 2) {
                let flyUp = progress * 400;
                let fade = 1 - progress;

                // 1. DRAW BOX BODY (Visible Sides)
                // Left Wall
                ctx.fillStyle = "#8b2a2a";
                ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-100, -50); ctx.lineTo(-100, 100); ctx.lineTo(0, 150); ctx.fill();
                // Right Wall
                ctx.fillStyle = "#6e1f1f";
                ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(100, -50); ctx.lineTo(100, 100); ctx.lineTo(0, 150); ctx.fill();

                // 2. RIBBONS ON SIDES
                ctx.fillStyle = "#d4af37";
                // Left vertical ribbon
                ctx.beginPath(); ctx.moveTo(-45, -22); ctx.lineTo(-55, -27); ctx.lineTo(-55, 122); ctx.lineTo(-45, 127); ctx.fill();
                // Right vertical ribbon
                ctx.beginPath(); ctx.moveTo(45, -22); ctx.lineTo(55, -27); ctx.lineTo(55, 122); ctx.lineTo(45, 127); ctx.fill();

                // 3. DRAW LID AND BOW (Grouped to fly up)
                ctx.save();
                ctx.translate(0, -flyUp);
                ctx.globalAlpha = fade;

                // Lid Top (Diamond)
                ctx.fillStyle = "#a33232";
                ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo(110, -65); ctx.lineTo(0, -120); ctx.lineTo(-110, -65); ctx.closePath(); ctx.fill();
                
                // Lid Cross-Ribbon
                ctx.fillStyle = "#e6be45";
                // Ribbon 1 (Left to Right)
                ctx.beginPath(); ctx.moveTo(-110, -65); ctx.lineTo(-90, -55); ctx.lineTo(110, -65); ctx.lineTo(90, -75); ctx.fill();
                // Ribbon 2 (Front to Back)
                ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo(-10, -20); ctx.lineTo(0, -120); ctx.lineTo(10, -110); ctx.fill();

                // BOW ASSEMBLY
                ctx.translate(0, -65); // Move to center of lid top
                
                // Diagonal Tails (Rectangles)
                ctx.fillStyle = "#d4af37";
                ctx.save();
                ctx.rotate(Math.PI / 4);
                ctx.fillRect(-50, -3, 100, 6);
                ctx.rotate(Math.PI / 2);
                ctx.fillRect(-50, -3, 100, 6);
                ctx.restore();

                // Bow Ovals
                ctx.beginPath(); ctx.ellipse(-25, 0, 12, 25, Math.PI/3.5, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(25, 0, 12, 25, -Math.PI/3.5, 0, Math.PI*2); ctx.fill();

                // The Knot (Circle)
                ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI * 2); ctx.fill();

                ctx.restore();
            }

            if (stage === 2) {
                // The Reveal (Pregnancy Test)
                ctx.save();
                ctx.translate(0, 0);
                ctx.fillStyle = "white";
                ctx.beginPath(); ctx.roundRect(-140, -30, 280, 60, [0, 30, 30, 0]); ctx.fill();
                ctx.fillStyle = "#3b73d1";
                ctx.beginPath(); ctx.roundRect(-180, -30, 80, 60, [30, 0, 0, 30]); ctx.fill();
                ctx.fillStyle = "#1a1a1a";
                ctx.fillRect(-20, -18, 110, 36);
                ctx.fillStyle = "#5f5"; ctx.font = "bold 18px Courier New"; ctx.textAlign = "center";
                ctx.fillText("PREGNANT", 35, 7);
                ctx.restore();
            }

            if (stage === 1) {
                progress += 0.025;
                if (progress >= 1) stage = 2;
            }
            ctx.restore();
            requestAnimationFrame(draw);
        }

        document.getElementById('openBtn').onclick = () => {
            stage = 1;
            document.getElementById('openBtn').style.display = 'none';
            document.getElementById('title').innerText = "SURPRISE! :)";
        };
        draw();
    </script>
</body>
</html>
